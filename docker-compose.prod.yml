#
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Key differences from dev:
#   - Ports bound to 127.0.0.1 only (traffic goes through nginx on the host)
#   - Resource limits on every service
#   - Restart always policies
#   - Log rotation on all containers
#   - No source-code volume mount on api (uses built image only)

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    ports:
      - "127.0.0.1:5432:5432"     # Localhost only — not reachable from outside
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── FastAPI Application ───────────────────────────────────────────────────
  api:
    ports:
      - "127.0.0.1:8000:8000"     # Nginx proxies to this
    volumes: []                     # Override: no source bind-mount in production
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery:
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 256M
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "5"

  # ── Celery Beat ───────────────────────────────────────────────────────────
  celery-beat:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Flower (Celery monitoring) ────────────────────────────────────────────
  flower:
    ports:
      - "127.0.0.1:5555:5555"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    ports:
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 256M
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 128M
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

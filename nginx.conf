#
# Install:
#   sudo cp nginx.conf /etc/nginx/sites-available/bbb
#   sudo ln -sf /etc/nginx/sites-available/bbb /etc/nginx/sites-enabled/bbb
#   sudo nginx -t && sudo systemctl reload nginx

# ── Rate limiting zones ─────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m  rate=5r/s;
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=30r/s;

# ── Upstream ────────────────────────────────────────────────────────────────
upstream bbb_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name bbb.aios.is www.bbb.aios.is;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bbb.aios.is www.bbb.aios.is;

    # ── SSL ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/bbb.aios.is/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bbb.aios.is/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options          DENY always;
    add_header X-Content-Type-Options   nosniff always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/bbb_access.log;
    error_log  /var/log/nginx/bbb_error.log;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 256;

    # ── Static assets (cache aggressively) ──────────────────────────────────
    location /static/ {
        alias /opt/bbb/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Auth endpoints (strict rate limit) ──────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://bbb_api;
        include /etc/nginx/proxy_params;
    }

    # ── Stripe webhooks (higher rate limit, no auth) ────────────────────────
    location /api/webhooks/ {
        limit_req zone=webhook_limit burst=50 nodelay;

        proxy_pass http://bbb_api;
        include /etc/nginx/proxy_params;
    }

    # ── WebSocket upgrade ───────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://bbb_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Health check (no rate limit) ────────────────────────────────────────
    location = /health {
        proxy_pass http://bbb_api;
        include /etc/nginx/proxy_params;
        access_log off;
    }

    # ── Metrics (internal only) ─────────────────────────────────────────────
    location = /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        deny all;

        proxy_pass http://bbb_api;
        include /etc/nginx/proxy_params;
    }

    # ── All other API routes ────────────────────────────────────────────────
    location / {
        limit_req zone=api_limit burst=40 nodelay;
        limit_req_status 429;

        proxy_pass http://bbb_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Request body limit
        client_max_body_size 10m;
    }
}

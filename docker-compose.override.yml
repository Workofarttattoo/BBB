version: '3.8'

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  api:
    volumes:
      - ./src:/app/src          # live-reload during development
    environment:
      LOG_LEVEL: DEBUG

  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3000:3000"

  flower:
    ports:
      - "5555:5555"

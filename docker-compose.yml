version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bbb_production
      POSTGRES_USER: bbbuser
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Ports only exposed to internal network; remove or override in
    # docker-compose.override.yml for local development.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bbbuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Cache + Task Queue)
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build: .
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://bbbuser:${DATABASE_PASSWORD}@postgres:5432/bbb_production
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No host volume mounts in production — use the built image.
    restart: unless-stopped

  # Celery Worker (Background Tasks)
  celery:
    build: .
    command: celery -A blank_business_builder.tasks worker --loglevel=info --concurrency=4
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://bbbuser:${DATABASE_PASSWORD}@postgres:5432/bbb_production
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Beat (Scheduled Tasks — runs autonomous ops on schedule)
  celery-beat:
    build: .
    command: celery -A blank_business_builder.tasks beat --loglevel=info --scheduler=celery.beat:PersistentScheduler
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://bbbuser:${DATABASE_PASSWORD}@postgres:5432/bbb_production
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Flower (Celery Monitoring) — bind only to localhost in production
  flower:
    build: .
    command: celery -A blank_business_builder.tasks flower --port=5555 --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:5555:5555"
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  # Prometheus (Metrics) — localhost-only in production
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped

  # Grafana (Dashboards) — localhost-only in production
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
